name: Update trade announcements

on:
  schedule:
    - cron: '19 10 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run script
        run: python ${{ github.workspace }}/update_trade_announcements.py

      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add trade_announcements_data.json
          git diff --cached --quiet || (git commit -m "Daily refresh" && git push)
