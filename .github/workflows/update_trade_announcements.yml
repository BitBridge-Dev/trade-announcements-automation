name: Update trade announcements

on:
  schedule:
    - cron: '19 10 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4

      - run: python update_trade_announcements.py

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add trade_announcements_data.json
          git diff --cached --quiet || git commit -m "Daily refresh"
          git push
